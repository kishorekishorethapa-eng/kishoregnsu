<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern UI Webpage</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        color: #333;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.4s ease;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
        transition: 0.4s ease;
    }

    h1 {
        margin-bottom: 15px;
        font-size: 28px;
    }

    p {
        margin-bottom: 25px;
        color: #555;
    }

    .counter {
        font-size: 40px;
        margin-bottom: 20px;
        font-weight: bold;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: #4e73df;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s ease;
        margin: 5px;
    }

    button:hover {
        background: #2e59d9;
        transform: scale(1.05);
    }

    .toggle {
        background: #858796;
    }

    .dark-mode {
        background: linear-gradient(135deg, #232526, #414345);
        color: white;
    }

    .dark-mode .container {
        background: #2d2d2d;
        color: white;
    }

    .dark-mode p {
        color: #ccc;
    }

    @media(max-width: 400px){
        .container{
            width: 90%;
            padding: 25px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Welcome 👋</h1>
    <p>This is a simple modern webpage with good UI/UX design.</p>

    <div class="counter" id="count">0</div>

    <button onclick="increase()">Increase</button>
    <button onclick="decrease()">Decrease</button>
    <br>
    <button class="toggle" onclick="toggleMode()">Toggle Dark Mode</button>
</div>

<script>
    let count = 0;

    function increase() {
        count++;
        document.getElementById("count").innerText = count;
    }

    function decrease() {
        count--;
        document.getElementById("count").innerText = count;
    }

    function toggleMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>

</body>
</html>
